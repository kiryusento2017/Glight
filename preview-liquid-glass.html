<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>液态玻璃红绿灯 — 预览</title>
<style>
/* ===== Reset ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ===== Body + 背景 ===== */
body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
    color: #fff;
    -webkit-font-smoothing: antialiased;
}

/* ===== 玻璃面板（archisvaze 架构） ===== */
.glass {
    position: absolute;
    width: 250px;
    height: 88px;
    border-radius: 44px;
    cursor: move;
    isolation: isolate;
    touch-action: none;
    box-shadow: 0px 4px 24px rgba(0, 0, 0, 0.18);
}

/* 顶层：tint + 内阴影 */
.glass::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    border-radius: inherit;
    box-shadow: inset 0 0 20px -5px rgba(255, 255, 255, 0.45);
    background-color: rgba(255, 255, 255, 0.06);
    pointer-events: none;
}

/* 底层：backdrop-filter 承载液态玻璃 */
.glass::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -1;
    border-radius: inherit;
    backdrop-filter: url(#liquid-glass-filter);
    -webkit-backdrop-filter: url(#liquid-glass-filter);
    isolation: isolate;
}

/* ===== 红绿灯 ===== */
.lights {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    height: 100%;
    padding: 0 34px;
    position: relative;
    z-index: 0;
}

.light {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #2a2a2a;
    box-shadow:
        /* 玻璃透镜凹槽 — 外环暗边 */
        0 0 0 1px rgba(0,0,0,0.32),
        /* 玻璃透镜凹槽 — 内环微亮边 */
        inset 0 1px 1px rgba(255,255,255,0.06),
        /* 透镜底部阴影 — 灯沉入玻璃的深度感 */
        inset 0 3px 6px rgba(0,0,0,0.40);
    transition: background 0.4s, box-shadow 0.4s;
    flex-shrink: 0;
}

/* 点亮 — 红光 + 玻璃折射散射 */
.light.red.active {
    background: #e8302a;
    box-shadow:
        /* 贴边折射光环 — 玻璃内部散射的红光 */
        0 0 0 2px rgba(255,50,50,0.28),
        /* 内圈发光 — 透镜表面高亮 */
        0 0 14px rgba(255,30,40,0.80),
        /* 外圈柔光 — 玻璃介质散射 */
        0 0 36px rgba(255,30,40,0.35),
        /* 底部保持嵌入深度 */
        inset 0 2px 3px rgba(255,255,255,0.18);
}
.light.yellow.active {
    background: #f0c040;
    box-shadow:
        0 0 0 2px rgba(255,200,40,0.28),
        0 0 14px rgba(255,190,20,0.80),
        0 0 36px rgba(255,190,20,0.35),
        inset 0 2px 3px rgba(255,255,255,0.18);
}
.light.green.active {
    background: #30c040;
    box-shadow:
        0 0 0 2px rgba(40,220,60,0.28),
        0 0 14px rgba(20,210,50,0.80),
        0 0 36px rgba(20,210,50,0.35),
        inset 0 2px 3px rgba(255,255,255,0.18);
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.10; }
}
.light.blinking {
    animation: blink 0.85s ease-in-out infinite;
}

/* ===== 底部提示栏 ===== */
.info {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    background: rgba(0,0,0,0.5);
    padding: 10px 22px;
    border-radius: 50px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
    pointer-events: none;
    white-space: nowrap;
}
.info b { color: #fff; font-weight: 700; }
.state-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 12px;
    margin-left: 2px;
    background: rgba(255,255,255,0.15);
}
</style>
</head>
<body>

<!-- 隐藏 SVG：存放滤镜定义 -->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0"
     style="position:absolute;overflow:hidden" color-interpolation-filters="sRGB">
    <defs id="svg-defs"></defs>
</svg>

<!-- 玻璃胶囊 -->
<div class="glass" id="glass">
    <div class="lights">
        <div class="light red"    id="lr"></div>
        <div class="light yellow" id="ly"></div>
        <div class="light green"  id="lg"></div>
    </div>
</div>

<!-- 底部提示栏 -->
<div class="info" id="info">
    按 <b>1</b> 红 · <b>2</b> 黄 · <b>3</b> 绿 · <b>4</b> 灰 — 拖拽移动 — 当前：<span class="state-tag" id="state-tag">红 · 执行中</span>
</div>

<script>
// ===================================================================
// 状态管理
// ===================================================================
var STATES = {
    1: { name: '红 · 执行中', active: 'red',    blink: true  },
    2: { name: '黄 · 思考中', active: 'yellow', blink: true  },
    3: { name: '绿 · 空闲',   active: 'green',  blink: false },
    4: { name: '灰 · 未运行', active: null,     blink: false },
};

var currentState = 1;

function setState(n) {
    currentState = n;
    var cfg = STATES[n];
    var map = { red: 'lr', yellow: 'ly', green: 'lg' };

    Object.keys(map).forEach(function(color) {
        var el = document.getElementById(map[color]);
        var on = color === cfg.active;
        el.classList.toggle('active', on);
        el.classList.toggle('blinking', on && cfg.blink);
    });

    document.getElementById('state-tag').textContent = cfg.name;
}

document.addEventListener('keydown', function(e) {
    if (e.key >= '1' && e.key <= '4') setState(parseInt(e.key));
});

// ===================================================================
// 滤镜生成（逐行移植自 archisvaze/liquid-glass）
// ===================================================================

var SURFACE_FNS = {
    convex_squircle: function(x) {
        return Math.pow(1 - Math.pow(1 - x, 4), 0.25);
    },
};

// 折射轮廓计算（Snell 定律）
function calculateRefractionProfile(glassThickness, bezelWidth, heightFn, ior, samples) {
    samples = samples || 128;
    var eta = 1 / ior;
    function refract(nx, ny) {
        var dot = ny;
        var k = 1 - eta * eta * (1 - dot * dot);
        if (k < 0) return null;
        var sq = Math.sqrt(k);
        return [-(eta * dot + sq) * nx, eta - (eta * dot + sq) * ny];
    }
    var profile = new Float64Array(samples);
    for (var i = 0; i < samples; i++) {
        var x = i / samples;
        var y = heightFn(x);
        var dx = x < 1 ? 0.0001 : -0.0001;
        var y2 = heightFn(x + dx);
        var deriv = (y2 - y) / dx;
        var mag = Math.sqrt(deriv * deriv + 1);
        var ref = refract(-deriv / mag, -1 / mag);
        if (!ref) { profile[i] = 0; continue; }
        profile[i] = ref[0] * ((y * bezelWidth + glassThickness) / ref[1]);
    }
    return profile;
}

// 位移图：R=水平位移, G=垂直位移（128 = 零位移）
function generateDisplacementMap(w, h, radius, bezelWidth, profile, maxDisp) {
    var c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    var ctx = c.getContext('2d');
    var img = ctx.createImageData(w, h);
    var d = img.data;
    for (var i = 0; i < d.length; i += 4) {
        d[i] = 128; d[i+1] = 128; d[i+2] = 0; d[i+3] = 255;
    }

    var r = radius, rSq = r * r, r1Sq = (r + 1) * (r + 1);
    var rBSq = Math.max(r - bezelWidth, 0) * Math.max(r - bezelWidth, 0);
    var wB = w - r * 2, hB = h - r * 2, S = profile.length;

    for (var y1 = 0; y1 < h; y1++) {
        for (var x1 = 0; x1 < w; x1++) {
            var px = x1 < r ? x1 - r : x1 >= w - r ? x1 - r - wB : 0;
            var py = y1 < r ? y1 - r : y1 >= h - r ? y1 - r - hB : 0;
            var dSq = px * px + py * py;
            if (dSq > r1Sq || dSq < rBSq) continue;
            var dist = Math.sqrt(dSq);
            var fromSide = r - dist;
            var op = dSq < rSq ? 1 : 1 - (dist - Math.sqrt(rSq)) / (Math.sqrt(r1Sq) - Math.sqrt(rSq));
            if (op <= 0 || dist === 0) continue;
            var cos = px / dist, sin = py / dist;
            var bi = Math.min(((fromSide / bezelWidth) * S) | 0, S - 1);
            var disp = profile[bi] || 0;
            var dX = (-cos * disp) / maxDisp, dY = (-sin * disp) / maxDisp;
            var idx = (y1 * w + x1) * 4;
            d[idx]     = (128 + dX * 127 * op + 0.5) | 0;
            d[idx + 1] = (128 + dY * 127 * op + 0.5) | 0;
        }
    }
    ctx.putImageData(img, 0, 0);
    return c.toDataURL();
}

// 高光图：模拟玻璃表面反射
function generateSpecularMap(w, h, radius, bezelWidth, angle) {
    angle = angle != null ? angle : Math.PI / 3;
    var c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    var ctx = c.getContext('2d');
    var img = ctx.createImageData(w, h);
    var d = img.data;
    d.fill(0);

    var r = radius, rSq = r * r, r1Sq = (r + 1) * (r + 1);
    var rBSq = Math.max(r - bezelWidth, 0) * Math.max(r - bezelWidth, 0);
    var wB = w - r * 2, hB = h - r * 2;
    var sv = [Math.cos(angle), Math.sin(angle)];

    for (var y1 = 0; y1 < h; y1++) {
        for (var x1 = 0; x1 < w; x1++) {
            var px = x1 < r ? x1 - r : x1 >= w - r ? x1 - r - wB : 0;
            var py = y1 < r ? y1 - r : y1 >= h - r ? y1 - r - hB : 0;
            var dSq = px * px + py * py;
            if (dSq > r1Sq || dSq < rBSq) continue;
            var dist = Math.sqrt(dSq);
            var fromSide = r - dist;
            var op = dSq < rSq ? 1 : 1 - (dist - Math.sqrt(rSq)) / (Math.sqrt(r1Sq) - Math.sqrt(rSq));
            if (op <= 0 || dist === 0) continue;
            var cos = px / dist, sin = -py / dist;
            var dot = Math.abs(cos * sv[0] + sin * sv[1]);
            var edge = Math.sqrt(Math.max(0, 1 - (1 - fromSide) * (1 - fromSide)));
            var coeff = dot * edge;
            var col = (255 * coeff) | 0;
            var alpha = (col * coeff * op) | 0;
            var idx = (y1 * w + x1) * 4;
            d[idx] = col; d[idx+1] = col; d[idx+2] = col; d[idx+3] = alpha;
        }
    }
    ctx.putImageData(img, 0, 0);
    return c.toDataURL();
}

// ===================================================================
// 玻璃参数（与 archisvaze 默认值对齐）
// ===================================================================
var P = {
    thickness: 32,
    bezel: 26,
    ior: 3.0,
    scale: 1.0,
    blur: 0.3,
    specOpacity: 0.5,
    specSat: 4,
};
var RADIUS = 44; // border-radius = height/2 → 胶囊形

function rebuildFilter() {
    var glass = document.getElementById('glass');
    var w = glass.offsetWidth;
    var h = glass.offsetHeight;
    if (w < 2 || h < 2) return;

    var heightFn = SURFACE_FNS.convex_squircle;
    var clampedBezel = Math.min(P.bezel, RADIUS - 1, Math.min(w, h) / 2 - 1);

    var profile = calculateRefractionProfile(P.thickness, clampedBezel, heightFn, P.ior, 128);
    var absVals = [];
    for (var i = 0; i < profile.length; i++) absVals.push(Math.abs(profile[i]));
    var maxDisp = Math.max.apply(null, absVals) || 1;
    var dispUrl = generateDisplacementMap(w, h, RADIUS, clampedBezel, profile, maxDisp);
    var specUrl = generateSpecularMap(w, h, RADIUS, clampedBezel * 2.5);
    var scale = maxDisp * P.scale;

    document.getElementById('svg-defs').innerHTML =
        '<filter id="liquid-glass-filter" x="0%" y="0%" width="100%" height="100%">' +
            '<feGaussianBlur in="SourceGraphic" stdDeviation="' + P.blur + '" result="blurred_source" />' +
            '<feImage href="' + dispUrl + '" x="0" y="0" width="' + w + '" height="' + h + '" result="disp_map" />' +
            '<feDisplacementMap in="blurred_source" in2="disp_map" scale="' + scale + '" xChannelSelector="R" yChannelSelector="G" result="displaced" />' +
            '<feColorMatrix in="displaced" type="saturate" values="' + P.specSat + '" result="displaced_sat" />' +
            '<feImage href="' + specUrl + '" x="0" y="0" width="' + w + '" height="' + h + '" result="spec_layer" />' +
            '<feComposite in="displaced_sat" in2="spec_layer" operator="in" result="spec_masked" />' +
            '<feComponentTransfer in="spec_layer" result="spec_faded">' +
                '<feFuncA type="linear" slope="' + P.specOpacity + '" />' +
            '</feComponentTransfer>' +
            '<feBlend in="spec_masked" in2="displaced" mode="normal" result="with_sat" />' +
            '<feBlend in="spec_faded" in2="with_sat" mode="normal" />' +
        '</filter>';
}

// ===================================================================
// 拖拽
// ===================================================================
(function() {
    var glass = document.getElementById('glass');
    var sx, sy;
    glass.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        sx = e.clientX;
        sy = e.clientY;
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', function() {
            document.removeEventListener('pointermove', onMove);
        }, { once: true });
    });
    function onMove(e) {
        e.preventDefault();
        glass.style.left = glass.offsetLeft + e.clientX - sx + 'px';
        glass.style.top  = glass.offsetTop  + e.clientY - sy + 'px';
        sx = e.clientX;
        sy = e.clientY;
    }
})();

// ===================================================================
// 初始化
// ===================================================================
var _rebuildTimer;

function init() {
    var glass = document.getElementById('glass');
    glass.style.left = ((window.innerWidth - 250) / 2) + 'px';
    glass.style.top  = ((window.innerHeight - 88) / 2) + 'px';
    setState(1);
    // 双 rAF 确保布局完成
    requestAnimationFrame(function() {
        requestAnimationFrame(rebuildFilter);
    });
}

window.addEventListener('resize', function() {
    clearTimeout(_rebuildTimer);
    _rebuildTimer = setTimeout(rebuildFilter, 150);
});

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
